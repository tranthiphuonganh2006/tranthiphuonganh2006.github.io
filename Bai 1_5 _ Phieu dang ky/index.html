<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Đăng Ký</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .form-container {
            width: 600px;
            margin: 20px auto;
            background-color: white;
            border: 1px solid #ccc;
            padding: 20px;
        }
        .header-logo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid red;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        table {
            width: 100%;
        }
        td {
            padding: 5px;
            vertical-align: top;
        }
        .label-cell {
            width: 30%;
            text-align: right;
            font-weight: normal;
        }
        input[type="text"], input[type="email"], select, textarea {
            width: 90%;
            border: 1px solid #999;
        }
        textarea {
            height: 100px;
        }
        .btn-group {
            text-align: center;
            padding-top: 20px;
        }
        button {
            padding: 3px 15px;
            cursor: pointer;
        }
        .required {
            color: black;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div style="background-image: url("Images/logo_bg.gif"); background-size: 100% 100%;" class="header-logo">
        <div  style="font-weight: bold; color: #0056b3;" ><img src="Images/lachong.gif" width="162" height="80" alt=""/></div>
        <div style="font-style: italic; color: red; font-size: 24px; font-weight: bold;"><img src="Images/Flash.gif" width="67" height="80" alt=""/><img src="Images/dreamweaver.gif" width="72" height="80" alt=""/><img src="Images/adobe.gif" width="74" height="80" alt=""/></div>
    </div>

    <h2>PHIẾU ĐĂNG KÝ</h2>

    <form action="#" method="post">
        <table>
            <tr>
                <td class="label-cell">Họ và tên:</td>
                <td>
                    <input type="text" name="fullname" required>
                    <span class="required">(*)</span>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Địa chỉ:</td>
                <td><input type="text" name="address"></td>
            </tr>

            <tr>
                <td class="label-cell">Email:</td>
                <td>
                    <input type="email" name="email" required>
                    <span class="required">(*)</span>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Giới tính:</td>
                <td>
                    <input type="radio" name="gender" value="Nam" id="nam"> <label for="nam">Nam</label>
                    <input type="radio" name="gender" value="Nu" id="nu"> <label for="nu">Nữ</label>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Tuổi:</td>
                <td>
                    <input type="text" name="age" style="width: 50px;" required>
                    <span class="required">(*)</span>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Sở thích:</td>
                <td>
                    <input type="checkbox" name="hobby" value="thethao"> Thể thao <br>
                    <input type="checkbox" name="hobby" value="vanhoc"> Văn học <br>
                    <input type="checkbox" name="hobby" value="it"> Công nghệ thông tin <br>
                    <input type="checkbox" name="hobby" value="lichsu"> Lịch sử <br>
                    <input type="checkbox" name="hobby" value="game"> Game
                </td>
            </tr>

            <tr>
                <td class="label-cell">Chuyên ngành:</td>
                <td>
                    <select name="major">
                        <option value="web">Công nghệ Web</option>
                        <option value="app">Thiết kế Web</option>
                        <option value="network">Lập trình Web</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Gửi hình:</td>
                <td>
                    <input type="text" style="width: 60%;" placeholder="Đường dẫn file...">
                    <button type="button">Browse...</button>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Yêu cầu:</td>
                <td>
                    <textarea name="request"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" class="btn-group">
                    <button type="submit">Gửi thông tin</button>
                    <button type="reset">Nhập lại</button>
                </td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
