<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết quả học tập</title>
    <style>
        body {
            font-family: Arial;
        }

        .container {
            width: 650px;
            margin: auto;
            border: 1px solid black;
            padding: 10px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 600px;
            border-collapse: collapse;
            margin: auto;
        }

        th, td {
            border: 1px solid purple;
            padding: 5px;
            text-align: center;
        }

        .header {
            background-color: lime;
        }

        .footer {
            background-color: lime;
            font-weight: bold;
        }

        .left {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>KẾT QUẢ HỌC TẬP</h2>

    <table>
        <tr class="header">
            <th rowspan="2">Họ và tên<br>Học Sinh</th>
            <th colspan="2">Năm Sinh</th>
            <th rowspan="2">Điểm TB</th>
            <th rowspan="2">Xếp Loại</th>
        </tr>

        <tr class="header">
            <th>Nam</th>
            <th>Nữ</th>
        </tr>

        <tr>
            <td class="left">Lê Thanh Xuân</td>
            <td></td>
            <td>1950</td>
            <td>8.5</td>
            <td>Giỏi</td>
        </tr>

        <tr>
            <td class="left">Phan Thế Hạ</td>
            <td>1985</td>
            <td></td>
            <td>6.5</td>
            <td>Khá</td>
        </tr>

        <tr>
            <td class="left">Trần Hoài Thu</td>
            <td></td>
            <td>1986</td>
            <td>9.5</td>
            <td>Xuất sắc</td>
        </tr>

        <tr>
            <td class="left">Trương Lưu Đông</td>
            <td>1984</td>
            <td></td>
            <td>6.0</td>
            <td>Trung Bình</td>
        </tr>

        <tr>
            <td class="left">Lưu Thế Mạc</td>
            <td></td>
            <td>1985</td>
            <td>4.5</td>
            <td>Kém</td>
        </tr>

        <tr class="footer">
            <td colspan="3">Tổng số học sinh đạt:</td>
            <td colspan="2">4 Học sinh</td>
        </tr>
    </table>
</div>

</body>
</html>
