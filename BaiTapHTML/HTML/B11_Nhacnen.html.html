<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Phát Đĩa Nhạc Online</title>
<style type="text/css">
    /* Reset mặc định */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-image: url(../../New%20folder/Images/tai-bo-hinh-nen-may-tinh-10.png);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(28, 59, 78, 0.35); 
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: -1;
    }

    .box {
        background: rgba(22, 43, 59, 0.8); 
        width: 380px;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        border: 1px solid rgba(240, 142, 116, 0.2); 
        text-align: center;
        position: relative;
        z-index: 1;
    }

    h2 {
        font-size: 1.6rem;
        margin-bottom: 25px;
        color: #F08E74; 
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 2px solid rgba(240, 142, 116, 0.3);
        padding-bottom: 10px;
        text-shadow: 0 2px 10px rgba(240, 142, 116, 0.3);
    }

    .disc-container {
        position: relative;
        width: 220px;
        height: 220px;
        margin: 0 auto 30px;
    }

    .vinyl {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #2d2625 15%, #181312 25%, #2a3d45 60%, #111a1e 70%);
        border-radius: 50%;
        border: 8px solid #141110;
        box-shadow: 0 8px 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.05);
        position: relative;
        animation: rotateDisc 10s linear infinite;
        animation-play-state: paused; /* Mặc định đĩa đứng yên */
    }

    .vinyl-label {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #FAD67B 0%, #F08E74 100%); 
        border-radius: 50%;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        border: 4px solid #181312;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #2d2625;
        font-size: 1.1rem;
        box-shadow: 0 0 10px rgba(240, 142, 116, 0.5);
    }

    .vinyl-label::after {
        content: "";
        width: 12px;
        height: 12px;
        background: #181312;
        border-radius: 50%;
    }

    @keyframes rotateDisc {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .playlist {
        list-style: none;
        width: 100%;
    }

    .playlist li {
        margin-bottom: 12px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .playlist li:hover {
        background: rgba(240, 142, 116, 0.1); 
        border-color: rgba(240, 142, 116, 0.3);
    }

    .playlist a {
        color: #D3E4ED; 
        text-decoration: none;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: color 0.3s ease;
        width: 100%;
        cursor: pointer;
    }

    .playlist a:hover {
        color: #FAD67B; 
    }

    .play-icon {
        font-size: 0.9rem;
        opacity: 0.7;
    }
</style>
</head>

<body>
    
    <div class="box">
        <h2>Nhạc Online</h2>

        <!-- Container Đĩa Nhạc Xoay -->
        <div class="disc-container">
            <div class="vinyl" id="vinyl">
                <div class="vinyl-label">🎵</div>
            </div>
        </div>

        <!-- Danh sách nhạc -->
        <ul class="playlist">
            <li>
                <!-- Truyền thêm tham số 'event' vào hàm để xử lý chặn chuyển trang -->
                <a href= "../Sounds/nhac - (320 Kbps).mp3"  onclick="playMusic(event, '../Sounds/nhac - (320 Kbps).mp3', 'Phép màu', this)">
                    <span>1. Phép màu</span>
                    <span class="play-icon">▶</span>
                </a>
            </li>
            <li>
                <a href="../Sounds/nhac1 - (320 Kbps).mp3" onclick="playMusic(event, '../Sounds/nhac1 - (320 Kbps).mp3', 'Nơi này có anh', this)">
                    <span>2. Nơi này có anh</span>
                    <span class="play-icon">▶</span>
                </a>
            </li>
            <li>
                <a href="../Sounds/nhac3 - (320 Kbps).mp3" onclick="playMusic(event, '../Sounds/nhac3 - (320 Kbps).mp3', 'Chiếc khăn gió ấm', this)">
                    <span>3. Chiếc khăn gió ấm</span>
                    <span class="play-icon">▶</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- THÀNH PHẦN THÊM MỚI: Thẻ phát âm thanh ẩn -->
    <audio id="player"></audio>

    <script>
        const vinyl = document.getElementById('vinyl');
        const player = document.getElementById('player');
        let currentLink = null; // Lưu lại thẻ <a> của bài hát đang phát

        // Hàm xóa màu kích hoạt (active) của bài trước đó
        function resetUI() {
            document.querySelectorAll('.playlist li').forEach(li => {
                li.style.background = "rgba(255, 255, 255, 0.04)";
                li.style.borderColor = "rgba(255, 255, 255, 0.05)";
                li.querySelector('a').style.color = "#D3E4ED";
                li.querySelector('.play-icon').innerText = "▶";
            });
        }

        function playMusic(event, fileUrl, songTitle, linkElement) {
            // LỆNH QUAN TRỌNG: Chặn không cho trình duyệt tự chuyển trang/tải file
            event.preventDefault();

            // Nếu bấm lại vào đúng bài đang phát -> Tạm dừng (Pause)
            if (currentLink === linkElement && !player.paused) {
                player.pause();
                vinyl.style.animationPlayState = 'paused';
                linkElement.querySelector('.play-icon').innerText = "▶";
                return;
            }

            // Nếu bấm vào bài đang tạm dừng -> Phát tiếp (Resume)
            if (currentLink === linkElement && player.paused) {
                player.play();
                vinyl.style.animationPlayState = 'running';
                linkElement.querySelector('.play-icon').innerText = "⏸";
                return;
            }

            // Nếu chọn một bài hoàn toàn mới
            resetUI();
            currentLink = linkElement;
            player.src = fileUrl; // Nạp đường dẫn bài mới vào bộ phát

            player.play().then(() => {
                vinyl.style.animationPlayState = 'running'; // Xoay đĩa
                
                // Đổi màu bài đang chọn (Active style)
                const parentLi = linkElement.parentElement;
                parentLi.style.background = "rgba(240, 142, 116, 0.18)";
                parentLi.style.borderColor = "rgba(240, 142, 116, 0.4)";
                linkElement.style.color = "#FAD67B";
                linkElement.querySelector('.play-icon').innerText = "⏸";
                console.log("Đang phát: " + songTitle);
            }).catch(err => {
                console.log("Lỗi: Không tìm thấy file nhạc hoặc trình duyệt chặn tự động phát.", err);
            });
        }

        // Tự động dừng đĩa và reset giao diện khi nhạc hết bài
        player.addEventListener('ended', () => {
            vinyl.style.animationPlayState = 'paused';
            resetUI();
            currentLink = null;
        });
    </script>
</body>
</html>
