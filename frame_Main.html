<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Trang chủ</title>
<style type="text/css">
    body {
        /* Thay màu nền phẳng bằng Gradient chuyển màu mượt mà, tạo chiều sâu */
        background: linear-gradient(135deg, #7FA7B7 0%, #93BECD 50%, #B2D7E5 100%);
        color: #333333;
        margin: 0;
        padding: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
        /* Sử dụng hệ thống font hiện đại, sắc nét hơn */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .container {
        position: relative;
        width: 100%;
        max-width: 1715px; /* Giữ nguyên kích thước tối đa của bạn */
        margin: 0 auto;
    }
    .container img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 20px; /* Bo góc mềm mại, nghệ thuật hơn */
        /* Bóng đổ hiệu ứng nổi (3D Layer) chuyên nghiệp */
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25), 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    .welcome-banner {
    position: absolute;
    /* Giữ nguyên vị trí tọa độ cũ của bạn */
    top: 221px;
    left: 976px;
    transform: translate(-50%, -50%);
    /* Nền trắng hiệu ứng kính mờ (Glassmorphism) cao cấp */
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Căn chỉnh không gian */
    padding: 16px 40px;
    border-radius: 50px; /* Bo tròn hoàn hảo kiểu kẹo viên (Pill-shaped) */
    /* Bóng đổ mịn cho Banner để tách biệt với hình nền phía sau */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.4);
    margin: 0;
    text-align: center;
    box-sizing: border-box;
    white-space: nowrap;
    width: 540px; /* Giữ nguyên chiều rộng */
    }
    .welcome-banner b {
        font-size: 1.65rem;
        /* Đổi sang màu xanh đen đậm để hài hòa với tone màu lạnh của Eula */
        color: #1A2E3B; 
        font-weight: 600;
        letter-spacing: 0.5px; /* Giãn chữ nhẹ giúp sang trọng hơn */
        line-height: 1.2;
        display: inline-block;
        vertical-align: middle;
    }
</style>
</head>

<body>
    <div class="container">
        <div class="welcome-banner"><b>Chào mừng bạn đến với trang chủ</b></div>
        <img src="IMAGES/eula-genshin-impact-genshin-impact-sword-fantasy-art-video-game-art-hd-wallpaper-preview.jpg" alt="Eula Genshin Impact" height="908"/>
    </div>
</body>
</html>
