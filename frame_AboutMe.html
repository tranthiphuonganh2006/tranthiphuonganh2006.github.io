<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
<style type="text/css">
    /* Giữ nguyên màu nền gốc và kích thước ban đầu */
    body {
        background-color: #2E86A4;
        margin: 0;
        padding: 10px 0; /* Tạo khoảng cách trên dưới một chút cho thoáng */
        overflow-x: hidden; /* Ngăn thanh cuộn ngang xuất hiện khi chữ chạy */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Phông chữ hiện đại hơn */
    }

    /* Khung chứa chữ chạy thay thế cho marquee cũ */
    .marquee-wrapper {
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        box-sizing: border-box;
    }

    /* Hiệu ứng chữ chạy mượt mà, đổi màu nhẹ nhàng */
    .marquee-content {
        display: inline-block;
        padding-left: 100%;
        animation: smoothMarquee 12s linear infinite;
        
        /* Phong cách chữ */
        color: #FFFFFF;
        font-size: 1.1rem;
        font-weight: 600;
        font-style: italic;
        letter-spacing: 1px;
        /* Thêm bóng đổ giúp chữ nổi bật và sắc nét trên nền xanh */
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3); 
    }

    /* Định nghĩa chuyển động mượt từ phải sang trái */
    @keyframes smoothMarquee {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-100%, 0, 0); }
    }
</style>
</head>

<body>
    <div class="marquee-wrapper">
        <span class="marquee-content">Thiết kế bởi Trần Thị Phương Anh</span>
    </div>
</body>
</html>
